services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data.sqlite3:/app/data.sqlite3
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
