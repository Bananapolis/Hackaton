services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data.sqlite3:/app/data.sqlite3
    restart: unless-stopped

  turn:
    image: coturn/coturn:4.7.0-r2
    env_file:
      - ./backend/.env
    environment:
      TURN_REALM: ${TURN_REALM:-vialive.libreuni.com}
      TURN_USERNAME: ${TURN_USERNAME:-via-turn}
      TURN_PASSWORD: ${TURN_PASSWORD:-change-this-turn-password}
      TURN_MIN_PORT: ${TURN_MIN_PORT:-49160}
      TURN_MAX_PORT: ${TURN_MAX_PORT:-49200}
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:-vialive.libreuni.com}
      - --user=${TURN_USERNAME:-via-turn}:${TURN_PASSWORD:-change-this-turn-password}
      - --min-port=${TURN_MIN_PORT:-49160}
      - --max-port=${TURN_MAX_PORT:-49200}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_RTC_ICE_SERVERS: ${VITE_RTC_ICE_SERVERS-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID-}
        VITE_APP_VERSION: ${VITE_APP_VERSION-}
    depends_on:
      - backend
      - turn
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: vialive
