services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data.sqlite3:/app/data.sqlite3
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
