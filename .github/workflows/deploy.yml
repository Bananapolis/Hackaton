name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio

      - name: Backend checks + coverage tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          python -m compileall app
          pytest

      - name: Publish Backend Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "backend/pytest-results.xml"
          check_name: "Backend Test Results"

      - name: Code Coverage Summary (Backend)
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: backend/coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: true
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Write Backend Coverage to Job Summary
        if: always()
        run: |
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY || true
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          > **How to read this table:**
          > Each row is a layer of the backend. **"."** = core app (config, models, auth, sessions). **"routers"** = API endpoints. **"services"** = analytics only (AI generation and PDF export are excluded — they require live API keys and cannot run in CI).
          >
          > **Scale:** 🔴 below 50% needs attention · ➖ 50–75% is acceptable · ✅ above 75% is strong
          > **Reference:** 60–80% is a healthy target for production web APIs. 80%+ on core logic is excellent.
          EOF

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests + coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Publish Frontend Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "frontend/vitest-results.xml"
          check_name: "Frontend Test Results"

      - name: Code Coverage Summary (Frontend)
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: frontend/coverage/cobertura-coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '50 75'

      - name: Write Frontend Coverage to Job Summary
        if: always()
        run: |
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY || true
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          > **How to read this table:**
          > **"frontend.src.components"** = individual UI components (buttons, cards, overlays). **"frontend.src"** = page-level logic and WebSocket handling. Entry point (`main.jsx`) and config files are excluded.
          > Branch rate measures whether both sides of every `if` statement are tested — harder to reach than line coverage.
          >
          > **Scale:** 🔴 below 50% needs attention · ➖ 50–75% is acceptable · ✅ above 75% is strong
          > **Reference:** UI components at 80%+ is excellent. Page-level logic at 40–60% is normal for apps with heavy real-time state.
          EOF

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_HOST" ]; then
            echo "Missing required repository secret: SSH_HOST" >&2
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "Missing required repository secret: SSH_USER" >&2
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing required repository secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          key = os.environ["SSH_PRIVATE_KEY"].replace("\r", "")
          if "\\n" in key:
              key = key.replace("\\n", "\n")
          with open(os.path.expanduser("~/.ssh/deploy_key"), "w", encoding="utf-8") as f:
              f.write(key)
              if not key.endswith("\n"):
                  f.write("\n")
          PY
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            'cd /home/deploy/apps/app && bash ./scripts/deploy-update.sh'

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/dev' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_HOST" ]; then
            echo "Missing required repository secret: SSH_HOST" >&2
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "Missing required repository secret: SSH_USER" >&2
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing required repository secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          key = os.environ["SSH_PRIVATE_KEY"].replace("\r", "")
          if "\\n" in key:
              key = key.replace("\\n", "\n")
          with open(os.path.expanduser("~/.ssh/deploy_key"), "w", encoding="utf-8") as f:
              f.write(key)
              if not key.endswith("\n"):
                  f.write("\n")
          PY
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy dev over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            'cd /home/deploy/apps/app-dev && git pull --ff-only && bash ./scripts/deploy-dev.sh'
