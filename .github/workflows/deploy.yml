name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Check syntax and formatting
        working-directory: backend
        run: |
          python -m compileall app
          ruff check . || echo "Ruff failed, but continuing for now"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Validate deploy secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_HOST" ]; then
            echo "Missing required repository secret: SSH_HOST" >&2
            exit 1
          fi
          if [ -z "$SSH_USER" ]; then
            echo "Missing required repository secret: SSH_USER" >&2
            exit 1
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing required repository secret: SSH_PRIVATE_KEY" >&2
            exit 1
          fi

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          python - <<'PY'
          import os
          key = os.environ["SSH_PRIVATE_KEY"].replace("\r", "")
          if "\\n" in key:
              key = key.replace("\\n", "\n")
          with open(os.path.expanduser("~/.ssh/deploy_key"), "w", encoding="utf-8") as f:
              f.write(key)
              if not key.endswith("\n"):
                  f.write("\n")
          PY
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            'cd /home/deploy/apps/app && bash ./scripts/deploy-update.sh'
